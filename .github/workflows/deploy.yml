name: Deploy to Apps Script

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: echo "$CLASPRC" > ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version (update existing deployment)
        run: clasp deploy --deploymentId AKfycbxHuLVbrYnMS2aMEFUppdpKfwfby6Kn4lqD8MDHFwMf7BFIaUlv6NywAzTB-tH-IXs --description "Auto-deploy from GitHub Actions ${{ github.sha }}"

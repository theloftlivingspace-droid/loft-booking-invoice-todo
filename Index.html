<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root {
      --primary: #4a86e8;
      --new-bg: #fff2cc;
      --done-bg: #d9ead3;
      --border: #e0e0e0;
      --highlight: #c9e0ff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", Roboto, sans-serif;
      margin: 0; padding: 0; background: #f5f6f8; color: #222;
    }
    header { background: var(--primary); color: white; padding: 16px 20px; }
    header h1 { margin: 0; font-size: 18px; }
    header p { margin: 4px 0 0; font-size: 12px; opacity: 0.85; }
    .tabs {
      display: flex; background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .tab-btn {
      flex: 1; padding: 14px 8px; text-align: center; cursor: pointer;
      font-weight: 600; font-size: 14px; color: #666;
      border: none; background: none; border-bottom: 3px solid transparent;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .badge {
      display: inline-block; background: #e0e0e0; color: #555;
      border-radius: 10px; padding: 1px 8px; font-size: 11px; margin-left: 4px;
    }
    .content { padding: 12px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: white; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px;
      display: flex; gap: 10px; align-items: flex-start;
      transition: opacity 0.2s, background 0.2s, box-shadow 0.3s;
    }
    .card.is-new { background: var(--new-bg); border-color: #ffd966; }
    .card.is-done { opacity: 0.5; background: var(--done-bg); }
    .card.highlighted {
      background: var(--highlight) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(74,134,232,0.3);
    }
    .card input[type=checkbox] {
      width: 22px; height: 22px; flex-shrink: 0; margin-top: 2px;
      accent-color: var(--primary);
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-weight: 700; font-size: 15px; margin-bottom: 2px; word-break: break-word; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-sub { font-size: 13px; color: #555; margin-bottom: 4px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 12px; color: #777; align-items: center; }
    .chip { background: #f0f0f0; border-radius: 6px; padding: 2px 8px; }
    .chip.flag-new { background: #ffd966; color: #5c4500; font-weight: 700; }
    .chip.net { background: #d9ead3; color: #38761d; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
    .chip.split { background: #cfe2ff; color: #1a4d8f; font-weight: 700; }
    .btn-copy-net {
      background: none; border: none; cursor: pointer; padding: 0 2px;
      font-size: 13px; color: #38761d; opacity: 0.7; transition: opacity 0.15s;
      line-height: 1;
    }
    .btn-copy-net:hover { opacity: 1; }
    .btn-copy-net.copied { color: #1a4d8f; }
    .btn-link {
      display: inline-flex; align-items: center; gap: 3px;
      background: none; border: 1px solid #ccc; border-radius: 6px;
      padding: 2px 8px; font-size: 12px; cursor: pointer; color: #444;
      transition: background 0.15s;
    }
    .btn-link:hover { background: #e8f0fe; border-color: var(--primary); color: var(--primary); }
    .btn-link.has-match { border-color: var(--primary); color: var(--primary); font-weight: 600; }
    .btn-copy {
      display: inline-flex; align-items: center; gap: 3px;
      background: none; border: 1px solid #ccc; border-radius: 6px;
      padding: 2px 8px; font-size: 12px; cursor: pointer; color: #444;
    }
    .btn-copy:hover { background: #f0f0f0; }
    .btn-copy.copied { border-color: #38761d; color: #38761d; }
    .empty { text-align: center; color: #999; padding: 40px 0; font-size: 14px; }
    .loading { text-align: center; padding: 40px 0; color: #999; }
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; font-size: 13px; color: #666;
    }
    .toggle-done {
      font-size: 12px; color: var(--primary); cursor: pointer;
      text-decoration: underline; background: none; border: none;
    }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 8px 18px; border-radius: 20px;
      font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <h1>🏠 The Loft — Booking &amp; Invoice To-Do</h1>
    <p id="todayLabel">กำลังโหลด...</p>
  </header>
  <div class="tabs">
    <button class="tab-btn active" data-tab="booking" onclick="switchTab('booking')">
      📅 Booking To Add <span class="badge" id="bookingCount">-</span>
    </button>
    <button class="tab-btn" data-tab="invoice" onclick="switchTab('invoice')">
      🧾 Invoice To Create <span class="badge" id="invoiceCount">-</span>
    </button>
  </div>
  <div class="content">
    <div class="panel active" id="panel-booking">
      <div class="toolbar">
        <span id="bookingSummary"></span>
        <button class="toggle-done" onclick="toggleShowDone('booking')">แสดง/ซ่อนรายการที่ทำแล้ว</button>
      </div>
      <div id="bookingList" class="loading">กำลังโหลดข้อมูล...</div>
    </div>
    <div class="panel" id="panel-invoice">
      <div class="toolbar">
        <span id="invoiceSummary"></span>
        <button class="toggle-done" onclick="toggleShowDone('invoice')">แสดง/ซ่อนรายการที่ทำแล้ว</button>
      </div>
      <div id="invoiceList" class="loading">กำลังโหลดข้อมูล...</div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    let DATA = null;
    let showDone = { booking: true, invoice: true };

    // Store items in JS arrays — avoid inline JSON in onclick attributes
    let _bookingItems = [];
    let _invoiceItems = [];

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
    }

    function toggleShowDone(tab) { showDone[tab] = !showDone[tab]; render(); }

    function load() {
      google.script.run.withSuccessHandler(onData).withFailureHandler(onError).getDashboardData();
    }

    function onError(err) {
      const msg = '<div class="empty">โหลดไม่สำเร็จ: ' + esc(err.message) + ' <button onclick="load()" style="margin-left:8px;padding:4px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer">ลองใหม่</button></div>';
      document.getElementById('bookingList').innerHTML = msg;
      document.getElementById('invoiceList').innerHTML = msg;
    }

    function onData(data) {
      DATA = data;
      document.getElementById('todayLabel').textContent = 'วันนี้: ' + data.today + ' • ข้อมูลจาก Sheet1 / Payout_Income_Log';
      render();
    }

    function render() { renderBooking(); renderInvoice(); }

    // ── Matching (key-set based, no inline JSON) ──────────────────
    function buildKeySet(items) {
      const s = new Set();
      items.forEach(x => (x.matchKeys || []).forEach(k => s.add(k)));
      return s;
    }

    function hasMatch(item, keySet) {
      return (item.matchKeys || []).some(k => keySet.has(k));
    }

    // Use array index as stable card ID — avoids passing complex strings into HTML
    function renderBooking() {
      const list = DATA.booking;
      _bookingItems = list;
      const container = document.getElementById('bookingList');
      const pending  = list.filter(x => !x.done).length;
      const newCount = list.filter(x => x.isNewToday && !x.done).length;
      document.getElementById('bookingCount').textContent = pending;
      document.getElementById('bookingSummary').textContent =
        'ทั้งหมด ' + list.length + ' รายการ • ค้างเพิ่ม ' + pending + ' • ใหม่วันนี้ ' + newCount;

      const invKeySet = buildKeySet(DATA.invoice);
      const visible = list.map((x,i) => ({item:x,idx:i})).filter(({item}) => showDone.booking || !item.done);
      if (!visible.length) { container.innerHTML = '<div class="empty">ไม่มีรายการ</div>'; return; }

      container.innerHTML = visible.map(({item, idx}) => {
        const cls = ['card'];
        if (item.isNewToday) cls.push('is-new');
        if (item.done) cls.push('is-done');
        const hasMat = hasMatch(item, invKeySet);

        return '<div class="' + cls.join(' ') + '" data-bidx="' + idx + '">' +
          '<input type="checkbox" class="booking-check" data-resid="' + esc(item.resId) + '" ' + (item.done ? 'checked' : '') + '>' +
          '<div class="card-body">' +
            '<div class="card-title">' +
              esc(item.room) + ' — ' + esc(item.guest) +
              '<button class="btn-copy" data-copy="' + esc(item.guest + ' / ' + (item.channel || 'Unknown')) + '" title="Copy ชื่อแขก / OTA">📋</button>' +
            '</div>' +
            '<div class="card-sub">' + esc(item.checkin) + ' → ' + esc(item.checkout) +
              (item.note ? ' • ' + esc(item.note) : '') + '</div>' +
            '<div class="card-meta">' +
              '<span class="chip">' + esc(item.channel) + '</span>' +
              '<span class="chip">' + esc(item.resId) + '</span>' +
              (item.isNewToday ? '<span class="chip flag-new">ใหม่วันนี้ ✅</span>' : '') +
              '<button class="btn-link ' + (hasMat ? 'has-match' : '') + '" data-jump-inv="' + idx + '">' +
                (hasMat ? '🧾 ดู Invoice' : '🧾 ไม่มี Invoice') +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function renderInvoice() {
      const list = DATA.invoice;
      _invoiceItems = list;
      const container = document.getElementById('invoiceList');
      const pending  = list.filter(x => !x.done).length;
      const newCount = list.filter(x => x.detectedToday && !x.done).length;
      document.getElementById('invoiceCount').textContent = pending;
      document.getElementById('invoiceSummary').textContent =
        'ทั้งหมด ' + list.length + ' รายการ • ค้างออกบิล ' + pending + ' • ตรวจพบวันนี้ ' + newCount;

      const bkKeySet = buildKeySet(DATA.booking);
      const visible = list.map((x,i) => ({item:x,idx:i})).filter(({item}) => showDone.invoice || !item.done);
      if (!visible.length) { container.innerHTML = '<div class="empty">ไม่มีรายการ</div>'; return; }

      container.innerHTML = visible.map(({item, idx}) => {
        const cls = ['card'];
        if (item.detectedToday) cls.push('is-new');
        if (item.done) cls.push('is-done');
        const hasMat = hasMatch(item, bkKeySet);

        const netNum = formatNum(item.net);
        const netRaw = String(item.net == null ? '' : item.net).replace(/[^0-9.]/g, '');

        const netChip = '<span class="chip net">' +
          'NET ฿' + esc(netNum) +
          (item.isSplitFromMulti ? ' <span style="opacity:.55;font-weight:400;font-size:11px">(รวม ฿' + esc(formatNum(item.groupNet)) + ')</span>' : '') +
          '<button class="btn-copy-net" data-copy="' + esc(netRaw) + '" title="Copy ยอด">⎘</button>' +
        '</span>';

        const splitChip = item.isSplitFromMulti
          ? '<span class="chip split">รายการ ' + item.splitIndex + '/' + item.splitTotal + '</span>' : '';

        return '<div class="' + cls.join(' ') + '" data-iidx="' + idx + '">' +
          '<input type="checkbox" class="invoice-check" data-invoicekey="' + esc(item.invoiceKey) + '" ' + (item.done ? 'checked' : '') + '>' +
          '<div class="card-body">' +
            '<div class="card-title">ห้อง ' + esc(item.room) + ' — ' + esc(item.guest) + '</div>' +
            '<div class="card-sub">' + esc(item.checkin) + ' → ' + esc(item.checkout) +
              (item.nights ? ' (' + esc(item.nights) + ' คืน)' : '') + '</div>' +
            '<div class="card-meta">' +
              '<span class="chip">' + esc(item.ota) + '</span>' +
              splitChip + netChip +
              '<span class="chip">ตรวจพบ ' + esc(item.detectedDate) + '</span>' +
              (item.detectedToday ? '<span class="chip flag-new">ตรวจพบวันนี้ ✅</span>' : '') +
              '<button class="btn-link ' + (hasMat ? 'has-match' : '') + '" data-jump-bk="' + idx + '">' +
                (hasMat ? '📅 ดู Booking' : '📅 ไม่มี Booking') +
              '</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function formatNum(n) {
      const v = parseFloat(String(n == null ? '' : n).replace(/,/g, ''));
      if (isNaN(v)) return String(n == null ? '' : n);
      return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ── Event delegation (no inline onclick with data) ────────────
    document.addEventListener('click', function(e) {
      // Copy buttons
      const copyBtn = e.target.closest('[data-copy]');
      if (copyBtn) {
        const text = copyBtn.getAttribute('data-copy');
        navigator.clipboard.writeText(text).then(() => {
          const orig = copyBtn.textContent;
          copyBtn.textContent = '✅'; copyBtn.classList.add('copied');
          showToast('คัดลอกแล้ว: ' + text);
          setTimeout(() => { copyBtn.textContent = orig; copyBtn.classList.remove('copied'); }, 2000);
        }).catch(() => showToast('ไม่สามารถคัดลอกได้'));
        return;
      }

      // Jump to invoice
      const jumpInv = e.target.closest('[data-jump-inv]');
      if (jumpInv) {
        const bIdx = parseInt(jumpInv.getAttribute('data-jump-inv'));
        const bItem = _bookingItems[bIdx];
        if (!bItem) return;
        const invKeySet = buildKeySet(DATA.invoice);
        const matchedInvIdx = DATA.invoice.findIndex(x => hasMatch(bItem, new Set(x.matchKeys || [])) || hasMatch(x, new Set(bItem.matchKeys || [])));
        switchTab('invoice');
        setTimeout(() => highlightCardByIdx('iidx', matchedInvIdx >= 0 ? matchedInvIdx : -1), 50);
        return;
      }

      // Jump to booking
      const jumpBk = e.target.closest('[data-jump-bk]');
      if (jumpBk) {
        const iIdx = parseInt(jumpBk.getAttribute('data-jump-bk'));
        const iItem = _invoiceItems[iIdx];
        if (!iItem) return;
        const matchedBkIdx = DATA.booking.findIndex(x => hasMatch(iItem, new Set(x.matchKeys || [])) || hasMatch(x, new Set(iItem.matchKeys || [])));
        switchTab('booking');
        setTimeout(() => highlightCardByIdx('bidx', matchedBkIdx >= 0 ? matchedBkIdx : -1), 50);
        return;
      }
    });

    function highlightCardByIdx(attr, idx) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
      if (idx < 0) { showToast('ไม่พบรายการที่ตรงกัน'); return; }
      const el = document.querySelector('[data-' + attr + '="' + idx + '"]');
      if (el) {
        el.classList.add('highlighted');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => el.classList.remove('highlighted'), 3000);
      } else {
        showToast('ไม่พบรายการที่ตรงกัน');
      }
    }

    // ── Checkbox listeners ────────────────────────────────────────
    document.getElementById('bookingList').addEventListener('change', function(e) {
      const el = e.target;
      if (!el.classList.contains('booking-check')) return;
      const resId = el.dataset.resid; const checked = el.checked;
      el.disabled = true;
      google.script.run
        .withSuccessHandler(() => {
          const item = DATA.booking.find(x => x.resId === resId);
          if (item) item.done = checked;
          el.disabled = false; renderBooking();
        })
        .withFailureHandler(() => { el.checked = !checked; el.disabled = false; })
        .setBookingDone(resId, checked);
    });

    document.getElementById('invoiceList').addEventListener('change', function(e) {
      const el = e.target;
      if (!el.classList.contains('invoice-check')) return;
      const invoiceKey = el.dataset.invoicekey; const checked = el.checked;
      el.disabled = true;
      google.script.run
        .withSuccessHandler(() => {
          const item = DATA.invoice.find(x => x.invoiceKey === invoiceKey);
          if (item) item.done = checked;
          el.disabled = false; renderInvoice();
        })
        .withFailureHandler(() => { el.checked = !checked; el.disabled = false; })
        .setInvoiceDone(invoiceKey, checked);
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
  </script>
</body>
</html>
